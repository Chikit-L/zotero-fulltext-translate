name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .scaffold/build/*.xpi
            .scaffold/build/update.json
            .scaffold/build/update-beta.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages site
        shell: bash
        run: |
          mkdir -p .site/examples
          cp .scaffold/build/update.json .site/update.json
          cp .scaffold/build/update-beta.json .site/update-beta.json
          cp doc/examples/*.html .site/examples/
          cat > .site/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Full Text Translate</title>
            </head>
            <body>
              <h1>Full Text Translate</h1>
              <p><a href="./update.json">update.json</a></p>
              <p><a href="./update-beta.json">update-beta.json</a></p>
              <p><a href="./examples/GreatBarrierReef.translated.html">Example HTML Preview</a></p>
            </body>
          </html>
          EOF
          touch .site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
